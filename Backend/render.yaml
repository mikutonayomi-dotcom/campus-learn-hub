services:
  - type: web
    name: ccs-department-backend
    env: php
    buildCommand: composer install --optimize-autoloader --no-dev && php artisan config:cache && php artisan route:cache && php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: ccs-department-db
          property: host
      - key: DB_PORT
        fromService:
          type: pserv
          name: ccs-department-db
          property: port
      - key: DB_DATABASE
        fromService:
          type: pserv
          name: ccs-department-db
          property: database
      - key: DB_USERNAME
        fromService:
          type: pserv
          name: ccs-department-db
          property: username
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: ccs-department-db
          property: password
      - key: FRONTEND_URL_PRODUCTION
        value: https://your-frontend-domain.netlify.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: https://your-frontend-domain.netlify.app
      - key: SESSION_DOMAIN
        value: .onrender.com

databases:
  - name: ccs-department-db
    databaseName: ccs_department
    user: ccs_user
